name: CD

on:
  push:
    branches:
      - main
      - cache-tester

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gen-tags:
    name: Generate tags
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.set_tags.outputs.tags }}
      first_tag: ${{ steps.set_tags.outputs.first_tag }}

    if: >
      github.event_name == 'push'
      && github.ref_name != 'dev'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate tags
        id: set_tags
        run: |
          git fetch --tags || true

          TAG=$(cargo pkgid | cut -d "#" -f2)

          if ! git tag --list | grep -qx "v$TAG"; then
            # publish all semvers "X.Y.Z" + "X.Y" + "X"
            TAGS=($TAG ${TAG%.*} ${TAG%%.*})

            BRANCH=${{ github.ref_name }}
            if [[ $BRANCH == main ]]; then
              echo "⚠️ adding the **latest** tag"
              TAGS+=(latest)
            else
              TAGS+=($BRANCH)
            fi

            # write multi-line output
            {
              echo 'tags<<EOF'
              printf 'tomjtoth/cringe:%s\n' "${TAGS[@]}"
              echo 'EOF'
            } >> $GITHUB_OUTPUT

            # also expose the first tag as a single-line output
            echo "first_tag=${TAGS[0]}" >> $GITHUB_OUTPUT

            printf '%s\n' \
              "✅ Generated tags:" \
              "  ${TAGS[*]}"
          else
            echo "tags=" >> $GITHUB_OUTPUT
            echo "first_tag=" >> $GITHUB_OUTPUT

            printf '%s\n' \
              "❌ No tags generated:" \
              "  v$TAG is already present in repo."
          fi

  build-image:
    name: Generate Docker image
    runs-on: ubuntu-24.04-arm
    if: needs.gen-tags.outputs.tags != ''

    needs:
      - gen-tags

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v7
        env:
          CACHE: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/cringe:${{ github.ref_name }}-buildcache
        with:
          push: true
          context: .
          file: Dockerfile.cc
          build-args: |
            APP_VER=${{ needs.gen-tags.outputs.first_tag }}
          tags: |
            ${{ needs.gen-tags.outputs.tags }}
          cache-from: ${{ env.CACHE }}
          cache-to: ${{ env.CACHE }},mode=max

  gitops:
    name: Kustomize cluster
    runs-on: ubuntu-latest
    needs:
      - gen-tags
      - build-image
    steps:
      - name: GitOps in repo `kubernetes`
        run: |
          git clone \
            https://x-access-token:${{ secrets.KUBERNETES_REPO_PAT }}@github.com/tomjtoth/kubernetes.git \
            /tmp/kubernetes
          cd /tmp/kubernetes

          TAGS=(${{ needs.gen-tags.outputs.tags }})
          for docker_tag in ${TAGS[@]}; do
            # trim repo from docker_tag
            tag=${docker_tag#*:}
            
            if [ $tag == "latest" ]; then
              tag=prod
            fi

            K_DIR="apps/cringe/$tag"
            K_FILE="$K_DIR/kustomization.yml"
            if [ ! -f "$K_FILE" ]; then
              continue
            fi

            yq e '(.images[] | select(.name=="IMAGES/APP")).newName = "'"${TAGS[0]}"'"' -i "$K_FILE"
            git add "$K_FILE"

            echo "⚠️ bumping $tag"
          done

          # Commit and push if there are changes
          if git diff --cached --quiet; then
            echo "⚠️ No changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            msg="Updated image $K_DIR to ${TAGS[0]#*:}"
            git commit -m "$msg"
            git push origin main
            echo "✅ $msg"
          fi

  rel-tag:
    name: Create tag in repo
    needs:
      - gen-tags
      - gitops
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create tag
        run: |
          TAGS=(${{ needs.gen-tags.outputs.tags }})
          TAG=v${TAGS[0]#*:}

          # create annotated tag and push it back to the repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
